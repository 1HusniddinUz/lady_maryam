<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#F4EFE6" />
<title>Lady Maryam — Atelier Bot</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Grain texture overlay -->
  <div class="grain"></div>

  <!-- Main phone-style frame -->
  <div class="phone-frame">

    <!-- ═══ HEADER ═══ -->
    <header class="hdr">
      <div class="hdr-avatar" aria-label="Lady Maryam">
        <span>M</span>
      </div>
      <div class="hdr-info">
        <div class="hdr-name">
          <span class="hdr-symbol">✦</span>
          <span class="hdr-name-text">Lady Maryam</span>
        </div>
        <div class="hdr-status">
          <span class="status-dot"></span>
          onlayn · atelier
        </div>
      </div>
      <div class="hdr-actions">
        <button class="hdr-btn" id="btn-wishlist" aria-label="Sevimlilar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span class="hdr-badge" id="wishlist-badge" hidden>0</span>
        </button>
        <button class="hdr-btn" id="btn-cart" aria-label="Savatcha">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 6h15l-2 11H8L6 6Z"/>
            <path d="M6 6L5 3H2"/>
            <circle cx="9" cy="21" r="1.2"/>
            <circle cx="18" cy="21" r="1.2"/>
          </svg>
          <span class="hdr-badge" id="cart-badge" hidden>0</span>
        </button>
        <button class="hdr-btn" id="btn-clear" aria-label="Tozalash">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ═══ CHAT AREA ═══ -->
    <main class="chat-area" id="chat-area">
      <!-- Messages will be appended here by JS -->
    </main>

    <!-- ═══ INPUT BAR ═══ -->
    <footer class="input-bar">
      <input
        type="text"
        class="input-field"
        id="input-field"
        placeholder="Xabar yozing…"
        autocomplete="off"
      />
      <button class="send-btn" id="btn-send" aria-label="Yuborish">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2 11 13"/>
          <path d="M22 2 15 22l-4-9-9-4Z"/>
        </svg>
      </button>
    </footer>

    <!-- ═══ CART MODAL ═══ -->
    <div class="modal-overlay" id="modal-cart" hidden>
      <div class="modal-backdrop" data-close="cart"></div>
      <div class="modal-panel">
        <div class="modal-handle"></div>
        <div class="modal-head">
          <h2 class="modal-title">Savatcha<em> .</em></h2>
          <button class="modal-close" data-close="cart" aria-label="Yopish">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-body" id="cart-body">
          <!-- Cart items injected here -->
        </div>
        <div class="modal-foot" id="cart-foot" hidden>
          <div class="cart-total">
            <span class="cart-total-label">Jami</span>
            <strong class="cart-total-val" id="cart-total">0 so'm</strong>
          </div>
          <button class="btn-primary" id="btn-checkout">
            <span>Buyurtma berish</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ═══ ORDERS MODAL ═══ -->
    <div class="modal-overlay" id="modal-orders" hidden>
      <div class="modal-backdrop" data-close="orders"></div>
      <div class="modal-panel">
        <div class="modal-handle"></div>
        <div class="modal-head">
          <h2 class="modal-title">Buyurtmalarim</h2>
          <button class="modal-close" data-close="orders" aria-label="Yopish">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-body" id="orders-body">
          <!-- Orders injected here -->
        </div>
      </div>
    </div>

    <!-- ═══ WISHLIST MODAL ═══ -->
    <div class="modal-overlay" id="modal-wishlist" hidden>
      <div class="modal-backdrop" data-close="wishlist"></div>
      <div class="modal-panel">
        <div class="modal-handle"></div>
        <div class="modal-head">
          <h2 class="modal-title"><em>Sevimlilar</em></h2>
          <button class="modal-close" data-close="wishlist" aria-label="Yopish">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-body" id="wishlist-body">
          <!-- Wishlist injected here -->
        </div>
      </div>
    </div>

  </div>

  <!-- Toast notifications -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="main.js"></script>
</body>
</html>
